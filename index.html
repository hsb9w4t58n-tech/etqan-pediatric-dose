<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETQAN Pediatrics</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="container">

    <img src="logo.png" class="logo" alt="Al-Etqan Pharmacy Logo">

 

    <h1>حاسبة جرع أدوية الأطفال</h1>

    
</div>


<label>نوع الدواء</label>

<select id="drugType">
    <option value="oral">شرابات فموية</option>
    <option value="injection">حقن</option>
</select>

<label>الدواء</label>

<select id="drugSelect">
    <option value="">اختر الدواء</option>
</select>

<label>التركيز</label>

<select id="concentrationSelect">
    <option>اختر التركيز</option>
</select>

<label>الوزن (كغم)</label>

<input
type="number"
id="weight"
placeholder="الوزن (كغم)"
>

<label>العمر</label>

<div class="age-box">

<input
type="number"
id="age"
placeholder="العمر"
>

<select id="ageUnit">
<option value="years">سنوات</option>
<option value="months">أشهر</option>
</select>

</div>


<button onclick="calculateDose()">
احسب الجرعة
</button>

<button onclick="copyResult()" id="copyBtn">
📋 نسخ النتيجة
</button>

<div id="result"></div>

<footer class="footer">
    © 2026 ETQAN Pediatrics Dose Calculator
    <br>
    All Rights Reserved
    <br>
    Developed by Dr. Ahmed Ali
</footer>
</div>

<script src="app.js"></script>

</body>
</html>
