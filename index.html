<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETQAN Pediatrics</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="container">

       <h2 class="pharmacy-name">صيدلية الإتقان</h2>

<h1>حاسبة جرع ادوية الاطفال</h1>

<p>حاسبة جرعات الأطفال</p>


<select id="drugSelect">
<option>اختر الدواء</option>
</select>


<label>التركيز</label>

<select id="concentrationSelect">
<option>اختر التركيز</option>

</select>
<label>الوزن (كغم)</label>

<input
type="number"
id="weight"
placeholder="الوزن (كغم)"
>

<label>العمر</label>

<div class="age-box">

<input
type="number"
id="age"
placeholder="العمر"
>

<select id="ageUnit">
<option value="years">سنوات</option>
<option value="months">أشهر</option>
</select>

</div>


<button onclick="calculateDose()">
احسب الجرعة
</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
